- name: self_correction_date
  raw: "呃我们明天不对下周一下午三点开会"
  app: "WeChat"
  expected_contains:
    - "我们"
    - "下周一下午三点"
  expected_not_contains:
    - "呃"
    - "明天不对"

- name: chat_short_message
  raw: "帮我跟他说一下就是这个需求我今天做不完可能要明天上午给你"
  app: "WeChat"
  expected_style: "short_message"
  expected_contains:
    - "这个需求"
    - "明天上午"
  expected_not_contains:
    - "帮我跟他说一下"
    - "就是"

- name: email_generation
  raw: "请帮我写一封邮件告诉客户我们已经收到他的反馈然后会在两个工作日内回复"
  app: "Mail"
  expected_style: "email"
  expected_contains:
    - "收到"
    - "反馈"
    - "两个工作日"

- name: soften_selected_text
  selected_text: "这个功能不好用。"
  instruction: "改得委婉一点"
  expected_contains:
    - "这个功能"
    - "优化"

- name: translate_selected_text
  selected_text: "我们下周一下午三点开会。"
  instruction: "翻译成英文"
  expected_contains:
    - "next Monday"

- name: technical_terms
  raw: "帮我写一下这个 cursor 里面 swift ui 和 whisper 点 cpp 的集成方案"
  app: "Cursor"
  expected_contains:
    - "帮我写一下"
    - "Cursor"
    - "SwiftUI"
    - "whisper.cpp"

- name: ai_tool_preserves_task_intent
  raw: "帮我分析一下这个热键为什么 fn 可以但是 option 不行"
  app: "Codex"
  expected_contains:
    - "帮我分析一下"
    - "Fn"
    - "Option"

- name: chat_removes_handoff_shell
  raw: "帮我跟他说一下我们下周一下午三点开会"
  app: "WeChat"
  expected_contains:
    - "我们下周一下午三点开会"
  expected_not_contains:
    - "帮我跟他说一下"

- name: revised_judgement_keeps_latest
  raw: "前面先说看起来整理是正常的然后后面又说我感觉其实整理也不太正常"
  app: "Codex"
  expected_contains:
    - "整理其实不太正常"
  expected_not_contains:
    - "整理是正常的"

- name: compose_without_instruction_shell
  raw: "你帮我回复他说我今天来不及看完明天上午给结论"
  app: "Slack"
  expected_contains:
    - "今天来不及看完"
    - "明天上午给结论"
  expected_not_contains:
    - "你帮我回复他说"

- name: notes_auto_format_steps
  raw: "帮我整理一下今天要做三个事情第一个修复插入第二个调整润色第三个跑测试"
  app: "Notion"
  expected_contains:
    - "修复插入"
    - "调整润色"
    - "跑测试"
  expected_not_contains:
    - "第一个"

- name: cancel_command
  raw: "算了不要了"
  app: "WeChat"
  expected_action: "noop"

- name: markdown_notes
  raw: "帮我列一下这个语音输入法的三个模块第一个录音第二个识别第三个润色"
  app: "Notion"
  expected_contains:
    - "录音"
    - "识别"
    - "润色"
